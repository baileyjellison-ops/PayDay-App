<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PayDay Test</title>

<style>

body {
    margin:0;
    background:#101820;
    color:white;
    font-family:Arial;
}

header {
    background:#182b3a;
    padding:20px;
    font-size:28px;
    font-weight:bold;
}

nav {
    padding:15px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button {
    background:#2563eb;
    color:white;
    border:0;
    padding:15px;
    border-radius:8px;
    font-weight:bold;
}

.panel {
    background:#182b3a;
    margin:15px;
    padding:20px;
    border-radius:12px;
}

</style>

</head>


<body>


<header>
PayDay
</header>


<nav>

<button onclick="showDashboard()">
Dashboard
</button>


<button onclick="showBills()">
Bills
</button>


<button onclick="showPaycheck()">
Paycheck
</button>


</nav>


<div id="screen" class="panel">

Loading...

</div>



<script>


function showDashboard(){

document.getElementById("screen").innerHTML =

"<h2>Dashboard</h2><p>PayDay system online.</p>";

}



function showBills(){

document.getElementById("screen").innerHTML =

"<h2>Bills</h2><p>Rent: $1150</p><p>Credit Card: $300</p>";

}



function showPaycheck(){

document.getElementById("screen").innerHTML =

"<h2>Paycheck</h2><p>Next paycheck: $2184</p>";

}



showDashboard();


</script>


</body>

</html>
